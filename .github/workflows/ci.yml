name: CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

# Cancels redundant builds if you push multiple times quickly
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Pytest and Validation
    runs-on: ubuntu-latest
    
    permissions:
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          # Ensure test tools are present
          pip install pytest pytest-mock

      - name: Run Tests
        env:
          PYTHONPATH: ${{ github.workspace }}
          TESTING: "1"
          OPENROUTER_API_KEY: "sk-or-v1-dummy-key-for-testing"
          GOOGLE_API_KEY: "dummy-google-key"
          TAVILY_API_KEY: "dummy-tavily-key"
          LANGSMITH_API_KEY: "dummy-langsmith-key"
          LITELLM_API_KEY: "dummy-litellm-key"
        run: |
          # Use -v for detail and --maxfail to stop if the first 2 tests fail
          pytest test_guards.py -v --maxfail=2 --tb=short